<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analysis Results — RadiantAI</title>
<link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;500;600;700&family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #020a0f;
    --surface: #061218;
    --surface2: #0a1f2a;
    --cyan: #00e5ff;
    --teal: #00ffd5;
    --amber: #ffb700;
    --text: #e8f4f8;
    --text-muted: #7a9aaa;
    --border: rgba(0,229,255,0.12);
    --green: #00e676;
    --orange: #ff9800;
    --red: #ff4d6d;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(0,229,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.025) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none; z-index: 0;
  }

  nav {
    position: sticky; top: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 60px;
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    background: rgba(2,10,15,0.8);
  }
  .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.3rem; color: var(--cyan); text-decoration: none; }
  .logo span { color: var(--text); }
  .nav-right { display: flex; gap: 16px; align-items: center; }
  .nav-btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 20px; border-radius: 6px;
    font-family: 'Syne', sans-serif; font-size: 0.85rem; font-weight: 700;
    text-decoration: none; cursor: pointer; border: none;
    transition: all 0.2s; letter-spacing: 0.02em;
  }
  .nav-btn-ghost {
    color: var(--text-muted);
    background: transparent;
    border: 1px solid var(--border);
  }
  .nav-btn-ghost:hover { border-color: var(--cyan); color: var(--cyan); }
  .nav-btn-primary {
    background: var(--cyan); color: var(--bg);
  }
  .nav-btn-primary:hover { box-shadow: 0 0 20px rgba(0,229,255,0.4); }

  main {
    position: relative; z-index: 1;
    max-width: 1100px;
    margin: 0 auto;
    padding: 50px 40px 100px;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* NO RESULT STATE */
  .no-result {
    text-align: center;
    padding: 100px 40px;
  }
  .no-result h2 { font-family: 'Clash Display', sans-serif; font-size: 2rem; margin-bottom: 16px; }
  .no-result p { color: var(--text-muted); margin-bottom: 32px; }

  /* RESULTS HEADER */
  .results-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 40px;
    animation: fadeUp 0.6s ease both;
  }
  .results-badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(0,229,255,0.06);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 5px 14px;
    font-size: 0.75rem; font-weight: 600;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--cyan); margin-bottom: 14px;
  }
  .check-icon { color: var(--teal); font-size: 0.85rem; }
  h1 {
    font-family: 'Clash Display', sans-serif;
    font-size: 2.4rem; font-weight: 700;
    letter-spacing: -0.03em; margin-bottom: 8px;
  }
  .timestamp { color: var(--text-muted); font-size: 0.85rem; }

  /* OVERVIEW CARDS */
  .overview-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 32px;
    animation: fadeUp 0.6s ease 0.1s both;
  }

  .overview-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .overview-card:hover { border-color: rgba(0,229,255,0.3); }
  .overview-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0;
    height: 2px;
  }
  .card-normal::before { background: var(--green); }
  .card-warning::before { background: var(--amber); }
  .card-alert::before { background: var(--red); }
  .card-info::before { background: var(--cyan); }

  .card-label {
    font-size: 0.72rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--text-muted); margin-bottom: 10px;
  }
  .card-value {
    font-family: 'Clash Display', sans-serif;
    font-size: 1.8rem; font-weight: 700;
    line-height: 1; margin-bottom: 6px;
  }
  .card-sub { font-size: 0.8rem; color: var(--text-muted); }

  .status-normal { color: var(--green); }
  .status-abnormal { color: var(--red); }
  .status-attention { color: var(--amber); }

  /* MAIN CONTENT GRID */
  .content-grid {
    display: grid;
    grid-template-columns: 320px 1fr;
    gap: 24px;
    animation: fadeUp 0.6s ease 0.2s both;
  }

  /* IMAGE PANEL */
  .image-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    height: fit-content;
    position: sticky;
    top: 80px;
  }
  .panel-title {
    font-family: 'Syne', sans-serif;
    font-size: 0.8rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--text-muted); margin-bottom: 16px;
  }
  .xray-display {
    background: #050505;
    border-radius: 10px;
    aspect-ratio: 3/4;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
    margin-bottom: 16px;
    position: relative;
  }
  .xray-display img {
    width: 100%; height: 100%;
    object-fit: contain;
    filter: brightness(1.1) contrast(1.1);
  }
  .xray-placeholder {
    color: var(--text-muted); font-size: 0.85rem; text-align: center;
    padding: 20px;
  }
  .img-quality {
    display: flex; align-items: center; justify-content: space-between;
    font-size: 0.82rem;
  }
  .quality-label { color: var(--text-muted); }
  .quality-badge {
    padding: 3px 10px; border-radius: 100px;
    font-weight: 700; font-size: 0.75rem;
  }
  .quality-good { background: rgba(0,230,118,0.1); color: var(--green); border: 1px solid rgba(0,230,118,0.2); }
  .quality-fair { background: rgba(255,183,0,0.1); color: var(--amber); border: 1px solid rgba(255,183,0,0.2); }
  .quality-poor { background: rgba(255,77,109,0.1); color: var(--red); border: 1px solid rgba(255,77,109,0.2); }

  /* RIGHT PANEL */
  .right-panel { display: flex; flex-direction: column; gap: 20px; }

  .section-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
  }
  .section-head {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 20px;
  }
  .section-icon {
    width: 36px; height: 36px;
    background: rgba(0,229,255,0.08);
    border: 1px solid var(--border);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem;
  }
  .section-name {
    font-family: 'Syne', sans-serif;
    font-size: 1rem; font-weight: 700;
  }

  /* FINDINGS */
  .findings-list { display: flex; flex-direction: column; gap: 12px; }
  .finding-item {
    background: rgba(255,255,255,0.02);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 10px;
    padding: 16px 18px;
    display: flex; flex-direction: column; gap: 10px;
    transition: border-color 0.2s;
  }
  .finding-item:hover { border-color: rgba(0,229,255,0.2); }
  .finding-top { display: flex; align-items: center; justify-content: space-between; }
  .finding-name {
    font-weight: 600; font-size: 0.95rem;
    display: flex; align-items: center; gap: 8px;
  }
  .finding-region {
    font-size: 0.78rem; color: var(--text-muted);
    background: rgba(255,255,255,0.04);
    padding: 2px 8px; border-radius: 4px;
  }
  .severity-badge {
    padding: 3px 10px; border-radius: 100px;
    font-size: 0.72rem; font-weight: 700;
    letter-spacing: 0.05em; text-transform: uppercase;
  }
  .sev-normal { background: rgba(0,230,118,0.1); color: var(--green); border: 1px solid rgba(0,230,118,0.2); }
  .sev-mild { background: rgba(0,229,255,0.1); color: var(--cyan); border: 1px solid rgba(0,229,255,0.2); }
  .sev-moderate { background: rgba(255,183,0,0.1); color: var(--amber); border: 1px solid rgba(255,183,0,0.2); }
  .sev-severe { background: rgba(255,77,109,0.1); color: var(--red); border: 1px solid rgba(255,77,109,0.2); }

  .finding-desc { font-size: 0.85rem; color: var(--text-muted); line-height: 1.6; }
  .confidence-bar { display: flex; align-items: center; gap: 10px; }
  .conf-label { font-size: 0.75rem; color: var(--text-muted); width: 75px; }
  .conf-track {
    flex: 1; height: 4px;
    background: rgba(255,255,255,0.06);
    border-radius: 100px; overflow: hidden;
  }
  .conf-fill {
    height: 100%;
    border-radius: 100px;
    background: linear-gradient(90deg, var(--cyan), var(--teal));
    transition: width 1s ease;
  }
  .conf-pct { font-size: 0.78rem; font-weight: 700; color: var(--cyan); width: 36px; }

  /* DIFFERENTIAL */
  .diff-list { display: flex; flex-direction: column; gap: 8px; }
  .diff-item {
    display: flex; align-items: center; gap: 12px;
    background: rgba(255,255,255,0.02);
    border: 1px solid rgba(255,255,255,0.05);
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 0.9rem;
  }
  .diff-num {
    width: 24px; height: 24px;
    background: rgba(0,229,255,0.1);
    border: 1px solid rgba(0,229,255,0.2);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.72rem; font-weight: 800;
    color: var(--cyan); flex-shrink: 0;
  }

  /* RECOMMENDATIONS */
  .recs-list { display: flex; flex-direction: column; gap: 10px; }
  .rec-item {
    display: flex; align-items: flex-start; gap: 12px;
    background: rgba(255,255,255,0.02);
    border: 1px solid rgba(255,255,255,0.05);
    border-radius: 8px;
    padding: 14px 16px;
    font-size: 0.88rem; line-height: 1.5;
  }
  .rec-arrow { color: var(--teal); font-weight: 800; flex-shrink: 0; margin-top: 1px; }

  /* SUMMARY */
  .summary-text {
    font-size: 0.95rem;
    line-height: 1.8;
    color: var(--text-muted);
    border-left: 3px solid var(--cyan);
    padding-left: 20px;
  }

  /* DISCLAIMER */
  .disclaimer {
    background: rgba(255,183,0,0.04);
    border: 1px solid rgba(255,183,0,0.15);
    border-radius: 10px;
    padding: 16px 20px;
    font-size: 0.82rem;
    color: rgba(255,183,0,0.75);
    display: flex; align-items: flex-start; gap: 12px;
    margin-top: 4px;
  }
  .disc-icon { flex-shrink: 0; margin-top: 1px; }

  /* PRINT */
  @media print {
    nav, .nav-right { display: none; }
    body { background: white; color: black; }
    .section-card, .overview-card, .image-panel { border: 1px solid #ddd; }
  }
</style>
</head>
<body>

<nav>
  <a href="/" class="logo">Radiant<span>AI</span></a>
  <div class="nav-right">
    <button class="nav-btn nav-btn-ghost" onclick="window.print()">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
      Print Report
    </button>
    <a href="/analyze" class="nav-btn nav-btn-primary">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
      New Analysis
    </a>
  </div>
</nav>

<main id="mainContent">
  <!-- Content injected by JS -->
</main>

<script>
  const result = JSON.parse(sessionStorage.getItem('xrayResult') || 'null');
  const previewUrl = sessionStorage.getItem('xrayPreview');
  const main = document.getElementById('mainContent');

  function getSeverityClass(sev) {
    if (!sev) return 'sev-mild';
    const s = sev.toLowerCase();
    if (s === 'normal') return 'sev-normal';
    if (s === 'mild') return 'sev-mild';
    if (s === 'moderate') return 'sev-moderate';
    if (s === 'severe' || s === 'critical') return 'sev-severe';
    return 'sev-mild';
  }

  function getStatusClass(status) {
    if (!status) return '';
    const s = status.toLowerCase();
    if (s === 'normal') return 'status-normal';
    if (s.includes('abnormal')) return 'status-abnormal';
    return 'status-attention';
  }

  function getQualityClass(q) {
    if (!q) return 'quality-good';
    const s = q.toLowerCase();
    if (s === 'good') return 'quality-good';
    if (s === 'fair') return 'quality-fair';
    return 'quality-poor';
  }

  if (!result) {
    main.innerHTML = `
      <div class="no-result">
        <h2>No Results Found</h2>
        <p>It looks like you haven't run an analysis yet.</p>
        <a href="/analyze" class="nav-btn nav-btn-primary" style="display:inline-flex">Upload X-Ray →</a>
      </div>
    `;
  } else {
    const now = new Date().toLocaleString('en-US', { dateStyle: 'long', timeStyle: 'short' });
    const findings = result.findings || [];
    const diffs = result.differential_diagnosis || [];
    const recs = result.recommendations || [];

    main.innerHTML = `
      <div class="results-header">
        <div>
          <div class="results-badge">
            <span class="check-icon">✓</span>
            Analysis Complete · Claude AI
          </div>
          <h1>Diagnostic Report</h1>
          <div class="timestamp">${now}</div>
        </div>
      </div>

      <div class="overview-grid">
        <div class="overview-card ${result.overall_status === 'Normal' ? 'card-normal' : result.overall_status === 'Abnormal' ? 'card-alert' : 'card-warning'}">
          <div class="card-label">Overall Status</div>
          <div class="card-value ${getStatusClass(result.overall_status)}">${result.overall_status || 'N/A'}</div>
          <div class="card-sub">AI Assessment</div>
        </div>
        <div class="overview-card card-info">
          <div class="card-label">AI Confidence</div>
          <div class="card-value" style="color:var(--cyan)">${result.confidence || 0}%</div>
          <div class="card-sub">Overall confidence</div>
        </div>
        <div class="overview-card card-warning">
          <div class="card-label">Findings</div>
          <div class="card-value" style="color:var(--amber)">${findings.length}</div>
          <div class="card-sub">Regions analyzed</div>
        </div>
        <div class="overview-card card-info">
          <div class="card-label">Image Quality</div>
          <div class="card-value" style="color:var(--teal);font-size:1.3rem">${result.image_quality || 'Good'}</div>
          <div class="card-sub">Scan quality</div>
        </div>
      </div>

      <div class="content-grid">
        <div class="image-panel">
          <div class="panel-title">Uploaded X-Ray</div>
          <div class="xray-display">
            ${previewUrl
              ? `<img src="${previewUrl}" alt="X-ray image">`
              : `<div class="xray-placeholder">🩻<br><br>Image not available</div>`
            }
          </div>
          <div class="img-quality">
            <span class="quality-label">Image Quality</span>
            <span class="quality-badge ${getQualityClass(result.image_quality)}">${result.image_quality || 'Good'}</span>
          </div>
        </div>

        <div class="right-panel">

          ${findings.length ? `
          <div class="section-card">
            <div class="section-head">
              <div class="section-icon">🔍</div>
              <div class="section-name">Findings & Abnormalities</div>
            </div>
            <div class="findings-list">
              ${findings.map(f => `
                <div class="finding-item">
                  <div class="finding-top">
                    <div class="finding-name">
                      ${f.name || 'Finding'}
                      <span class="finding-region">${f.region || ''}</span>
                    </div>
                    <span class="severity-badge ${getSeverityClass(f.severity)}">${f.severity || 'Reviewed'}</span>
                  </div>
                  ${f.description ? `<div class="finding-desc">${f.description}</div>` : ''}
                  <div class="confidence-bar">
                    <span class="conf-label">Confidence</span>
                    <div class="conf-track">
                      <div class="conf-fill" style="width:${f.confidence || 0}%"></div>
                    </div>
                    <span class="conf-pct">${f.confidence || 0}%</span>
                  </div>
                </div>
              `).join('')}
            </div>
          </div>
          ` : ''}

          ${diffs.length ? `
          <div class="section-card">
            <div class="section-head">
              <div class="section-icon">🧬</div>
              <div class="section-name">Differential Diagnosis</div>
            </div>
            <div class="diff-list">
              ${diffs.map((d, i) => `
                <div class="diff-item">
                  <div class="diff-num">${i + 1}</div>
                  ${d}
                </div>
              `).join('')}
            </div>
          </div>
          ` : ''}

          ${recs.length ? `
          <div class="section-card">
            <div class="section-head">
              <div class="section-icon">📋</div>
              <div class="section-name">Clinical Recommendations</div>
            </div>
            <div class="recs-list">
              ${recs.map(r => `
                <div class="rec-item">
                  <span class="rec-arrow">→</span>
                  ${r}
                </div>
              `).join('')}
            </div>
          </div>
          ` : ''}

          ${result.summary ? `
          <div class="section-card">
            <div class="section-head">
              <div class="section-icon">📝</div>
              <div class="section-name">AI Summary</div>
            </div>
            <div class="summary-text">${result.summary}</div>
          </div>
          ` : ''}

          <div class="disclaimer">
            <span class="disc-icon">⚠️</span>
            <span><strong>Medical Disclaimer:</strong> This AI analysis is a decision-support tool only and does not constitute a medical diagnosis. Always consult a licensed radiologist or physician for clinical decisions. RadiantAI is not liable for clinical outcomes based on this report.</span>
          </div>

        </div>
      </div>
    `;

    // Animate confidence bars
    setTimeout(() => {
      document.querySelectorAll('.conf-fill').forEach(bar => {
        const w = bar.style.width;
        bar.style.width = '0%';
        setTimeout(() => bar.style.width = w, 50);
      });
    }, 100);
  }
</script>
</body>
</html>
